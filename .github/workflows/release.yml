name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          # Strip the leading "v" from the tag so the on-screen version
          # ("v1.0.0") and the value we inject into the binary ("1.0.0")
          # agree — the version package prepends "v" itself when printing.
          stamped="${VERSION#v}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/dutraph/repofleet/internal/version.Version=${stamped}" \
            -o "dist/fleet-${GOOS}-${GOARCH}" ./cmd/fleet

      - uses: actions/upload-artifact@v4
        with:
          name: fleet-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/fleet-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          sha256sum fleet-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} exists — uploading assets with --clobber"
            gh release upload "${VERSION}" dist/fleet-* dist/SHA256SUMS --clobber
          else
            gh release create "${VERSION}" \
              --title "${VERSION}" \
              --generate-notes \
              dist/fleet-* dist/SHA256SUMS
          fi
